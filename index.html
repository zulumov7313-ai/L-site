<!DOCTYPE html>
<html lang="ru">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
overflow:hidden;
height:100vh;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
opacity:1;
transform:scale(1);
transition:.5s;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(.95);
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
max-width:650px;
width:90%;
box-shadow:0 0 25px rgba(255,255,255,.1);
}

h1{
font-size:2rem;
line-height:1.5;
margin-bottom:25px;
}

p{
font-size:1.1rem;
line-height:1.6;
margin-bottom:20px;
}

button{
padding:14px 25px;
margin:8px;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
background:white;
color:#0f172a;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.option{
width:240px;
}

input[type="date"]{
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
margin:15px 0;
}

.places{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.place-card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
border-radius:20px;
padding:20px;
cursor:pointer;
transition:.3s;
}

.place-card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,.15);
}

.emoji{
font-size:40px;
margin-bottom:10px;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
from{
transform:translateY(-100vh);
}
to{
transform:translateY(100vh);
}
}

#result{
font-size:22px;
line-height:2;
}
#success{
font-size:90px;
color:#4ade80;
margin-bottom:20px;
animation:pop .7s ease;
}

@keyframes pop{

0%{
transform:scale(0);
opacity:0;
}

70%{
transform:scale(1.2);
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>
</head>

<body>

<div id="screen1" class="screen">
<div class="card">

<h1 id="intro"></h1>

<button onclick="nextScreen('screen1','screen2')">
Продолжить ✨
</button>

</div>
</div>

<div id="screen2" class="screen hidden">
<div class="card">

<h1>Поэтому у меня есть один вопрос.</h1>

<button onclick="nextScreen('screen2','screen3')">
Узнать →
</button>

</div>
</div>

<div id="screen3" class="screen hidden">
<div class="card">

<h1>Как насчёт встретиться на выходных?</h1>

<p>Просто хорошо провести время.</p>

<button onclick="nextScreen('screen3','screen4')">
✅ Звучит хорошо
</button>

<button onclick="nextScreen('screen3','screenThink')">
🤔 Подумаю
</button>

</div>
</div>

<div id="screenThink" class="screen hidden">
<div class="card">

<h1>Ничего страшного 😊</h1>

<p>Иногда хорошим идеям нужно немного времени.</p>

<button onclick="nextScreen('screenThink','screen3')">
Назад
</button>

</div>
</div>

<div id="screen4" class="screen hidden">
<div class="card">

<h1>Выбери день 📅</h1>

<button class="option"
onclick="chooseDay('Суббота')">
Суббота
</button>

<button class="option"
onclick="chooseDay('Воскресенье')">
Воскресенье
</button>

<br>

<input type="date" id="dateInput">

<br>

<button onclick="customDate()">
Выбрать другую дату
</button>

</div>
</div>

<div id="screen5" class="screen hidden">
<div class="card">

<h1>Что тебе больше нравится?</h1>

<div class="places">

<div class="place-card"
onclick="finish('🎬 Кино')">

<div class="emoji">🎬</div>

Кино

</div>

<div class="place-card"
onclick="finish('☕ Кафе')">

<div class="emoji">☕</div>

Кафе

</div>

<div class="place-card"
onclick="finish('🌳 Прогулка')">

<div class="emoji">🌳</div>

Прогулка

</div>

<div class="place-card"
onclick="finish('🍕 Что-нибудь вкусное')">

<div class="emoji">🍕</div>

Поесть

</div>

</div>

</div>
</div>

<div id="screen6" class="screen hidden">
<div class="card">

<div id="success">
✓
</div>

<h1>Отлично ✨</h1>

<div id="result"></div>

<br>

<p>
Тогда договорились ✨
</p>

</div>
</div>

<script>

let selectedDay = "";

function nextScreen(hide,show){

document
.getElementById(hide)
.classList.add("hidden");

document
.getElementById(show)
.classList.remove("hidden");

}

function chooseDay(day){

selectedDay = day;

nextScreen(
"screen4",
"screen5"
);

}

function customDate(){

const date =
document.getElementById(
"dateInput"
).value;

if(date===""){

alert(
"Сначала выбери дату"
);

return;

}

const d =
new Date(date);

selectedDay =
d.toLocaleDateString(
"ru-RU",
{
day:"numeric",
month:"long",
year:"numeric"
}
);

nextScreen(
"screen4",
"screen5"
);

}

function finish(place){

fetch(
"https://api.telegram.org/bot8832449806:AAGtZFQCoS15I4fMQpVDRTAzWn7kxXZTh8c/sendMessage",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:"440846485",
text:
"💌 Новый ответ\n\n📅 " +
selectedDay +
"\n📍 " +
place
})
}
);

document
.getElementById(
"result"
)
.innerHTML =
"📅 " +
selectedDay +
"<br><br>" +
place;

nextScreen(
"screen5",
"screen6"
);

}

function typeWriter(
element,
text,
speed=40
){

element.innerHTML="";

let i=0;

function typing(){

if(i<text.length){

element.innerHTML +=
text.charAt(i);

i++;

setTimeout(
typing,
speed
);

}

}

typing();

}

typeWriter(

document.getElementById(
"intro"
),

"Иногда самые интересные истории начинаются с одного вопроса."

);

for(let i=0;i<120;i++){

let star =
document.createElement(
"div"
);

star.className =
"star";

let size =
Math.random()*3+1;

star.style.width =
size+"px";

star.style.height =
size+"px";

star.style.left =
Math.random()*100+"vw";

star.style.animationDuration =
(
Math.random()*10+10
)+"s";

document.body
.appendChild(star);

}

</script>

</body>
</html>
